<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="かすぴんホテル公式サイト｜上質なおもてなしと贅沢な空間。東京都心のラグジュアリーホテル。"/>
<title>KasupinHotel｜かすぴんホテル 公式サイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#b8933f;--gold-l:#d4b06a;--gold-p:#f5ead8;
  --navy:#1a2340;--dark:#0f0d08;--dark2:#1a1510;
  --wg:#f8f5f0;--text:#2a2218;--muted:#7a6a5c;
  --r:8px;--sh:0 8px 32px rgba(0,0,0,.10);--sh2:0 20px 60px rgba(0,0,0,.18);
  --t:.32s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);background:#fff;overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{display:block;width:100%;object-fit:cover}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
ul{list-style:none}

/* LOADING */
#ld{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity .7s,visibility .7s}
#ld.hide{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--gold);letter-spacing:.15em}
.ld-logo span{color:#fff}
.lb-w{width:160px;height:1px;background:rgba(255,255,255,.12)}
.lb-b{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-l));animation:lb 2s ease forwards}
@keyframes lb{to{width:100%}}
.ld-t{font-size:.68rem;letter-spacing:.45em;color:rgba(255,255,255,.32);text-transform:uppercase}

/* HEADER */
#hd{position:fixed;top:0;left:0;right:0;z-index:500;height:84px;display:flex;align-items:center;justify-content:space-between;padding:0 52px;transition:background var(--t),height var(--t)}
#hd.sc{background:rgba(10,8,4,.97);height:66px;box-shadow:0 1px 0 rgba(184,147,63,.2)}
.hd-logo{font-family:'Playfair Display',serif;font-size:1.55rem;color:var(--gold);letter-spacing:.08em;line-height:1}
.hd-logo small{display:block;font-size:.6rem;color:rgba(255,255,255,.45);letter-spacing:.28em;margin-top:3px;font-family:'Noto Sans JP',sans-serif;font-style:normal}
nav a{font-size:.78rem;letter-spacing:.12em;color:rgba(255,255,255,.78);padding:8px 15px;position:relative;transition:color var(--t)}
nav a::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--gold);transition:width var(--t)}
nav a:hover{color:var(--gold-l)}
nav a:hover::after{width:55%}
.nr{background:var(--gold) !important;color:var(--dark) !important;padding:10px 22px !important;border-radius:2px;font-weight:500 !important;margin-left:14px}
.nr::after{display:none !important}
.nr:hover{background:var(--gold-l) !important}
.hbg{display:none;flex-direction:column;gap:5px;width:30px;cursor:pointer}
.hbg span{display:block;height:1px;background:#fff;transition:var(--t)}
.hbg.op span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hbg.op span:nth-child(2){opacity:0}
.hbg.op span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mmenu{display:none;position:fixed;inset:0;z-index:490;background:rgba(10,8,4,.98);flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;visibility:hidden;transition:opacity var(--t),visibility var(--t)}
.mmenu.op{opacity:1;visibility:visible}
.mmenu-logo{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);letter-spacing:.1em;margin-bottom:12px}
.mmenu a{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;transition:color var(--t)}
.mmenu a:hover{color:var(--gold)}

/* HERO */
.hero{position:relative;height:100vh;min-height:600px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hs{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.6s ease;will-change:opacity}
.hs.ac{opacity:1}
.hs::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(10,8,4,.62) 0%,rgba(10,8,4,.22) 50%,rgba(10,8,4,.52) 100%)}
/* Unsplashの安定したCDN URL（photo IDベース） */
.hs:nth-child(1){background-image:url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600&q=75&auto=format&fit=crop')}
.hs:nth-child(2){background-image:url('https://images.unsplash.com/photo-1571003123894-1f0594d2b5d9?w=1600&q=75&auto=format&fit=crop')}
.hs:nth-child(3){background-image:url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1600&q=75&auto=format&fit=crop')}
.hc{position:relative;z-index:2;text-align:center;color:#fff;padding:0 24px;animation:fu 1.1s 2.1s both}
@keyframes fu{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:none}}
/* テキストロゴ（画像不要・常に表示） */
.hero-logo-text{font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold);letter-spacing:.2em;margin-bottom:6px;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.hero-logo-sub{font-size:.72rem;letter-spacing:.5em;color:rgba(255,255,255,.6);margin-bottom:28px;text-transform:uppercase}
.hey{font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;color:var(--gold-l);margin-bottom:18px}
.ht{font-family:'Playfair Display',serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:400;line-height:1.07;letter-spacing:.06em;text-shadow:0 4px 36px rgba(0,0,0,.45);margin-bottom:10px}
.ht em{font-style:italic;color:var(--gold-l)}
.hs2{font-size:clamp(.82rem,1.3vw,.98rem);color:rgba(255,255,255,.7);letter-spacing:.24em;margin-bottom:44px}
.hbs{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.bg{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--dark);padding:15px 42px;border-radius:2px;font-size:.83rem;font-weight:500;letter-spacing:.13em;transition:background var(--t),transform var(--t)}
.bg:hover{background:var(--gold-l);transform:translateY(-2px)}
.bgh{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,.55);color:#fff;padding:14px 40px;border-radius:2px;font-size:.83rem;letter-spacing:.13em;transition:border-color var(--t),background var(--t),transform var(--t)}
.bgh:hover{border-color:var(--gold);background:rgba(184,147,63,.1);transform:translateY(-2px)}
.hdots{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:10px}
.hdot{width:28px;height:1px;background:rgba(255,255,255,.3);cursor:pointer;transition:background var(--t)}
.hdot.ac{background:var(--gold)}
.sci{position:absolute;bottom:36px;right:50px;z-index:3;display:flex;flex-direction:column;align-items:center;gap:10px;color:rgba(255,255,255,.38);font-size:.63rem;letter-spacing:.25em}
.scl{width:1px;height:48px;background:linear-gradient(to bottom,rgba(184,147,63,.8),transparent);animation:sl 2.2s infinite}
@keyframes sl{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}100%{transform:scaleY(1);transform-origin:top;opacity:0}}

/* QUICK BOOK */
#qb{background:var(--dark2);border-top:1px solid rgba(184,147,63,.18)}
.qbi{max-width:1240px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto}
.qbf{display:flex;flex-direction:column;padding:20px 26px;border-right:1px solid rgba(255,255,255,.06);transition:background var(--t)}
.qbf:hover{background:rgba(184,147,63,.05)}
.qbf label{font-size:.63rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.qbf input,.qbf select{background:transparent;border:none;color:#fff;font-size:.9rem}
.qbf select option{background:var(--dark2)}
.qbf input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.3);cursor:pointer}
.qbs{background:var(--gold);color:var(--dark);padding:0 40px;font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;transition:background var(--t)}
.qbs:hover{background:var(--gold-l)}

/* SECTION COMMON */
.sw{max-width:1240px;margin:0 auto}
.sl{font-size:.68rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.st{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,3.8vw,3.2rem);font-weight:400;color:var(--dark);line-height:1.22;letter-spacing:.03em}
.sln{width:34px;height:1px;background:var(--gold);margin:18px 0 22px}
.sd{font-size:.93rem;color:var(--muted);line-height:2;max-width:520px}
.rv{opacity:0;transform:translateY(28px);transition:opacity .8s ease,transform .8s ease}
.rv.vs{opacity:1;transform:none}

/* NUMBERS */
#nb{background:var(--wg);padding:56px 48px}
.ng{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.ni{text-align:center;padding:18px}
.nv{font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold);line-height:1}
.nv sup{font-size:1rem;vertical-align:super}
.nl2{font-size:.76rem;color:var(--muted);letter-spacing:.13em;margin-top:9px}

/* ABOUT */
#ab{padding:112px 48px}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.aimgs{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:290px 185px;gap:10px}
.aim{grid-column:1/3;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh2)}
.aim img{height:290px;transition:transform .8s ease}
.aim:hover img{transform:scale(1.04)}
.ais{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.ais img{height:185px;transition:transform .8s ease}
.ais:hover img{transform:scale(1.05)}
.abg{display:inline-flex;align-items:center;gap:12px;background:var(--gold-p);border-left:3px solid var(--gold);padding:13px 18px;border-radius:3px;margin-top:28px;font-size:.83rem;color:#5c3d1e;font-weight:500;line-height:1.6}

/* ROOMS */
#rm{padding:112px 48px;background:var(--wg)}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:44px}
.rc{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform var(--t),box-shadow var(--t)}
.rc:hover{transform:translateY(-8px);box-shadow:var(--sh2)}
.riw{position:relative;overflow:hidden;height:235px}
.riw img{height:100%;transition:transform .8s ease}
.rc:hover .riw img{transform:scale(1.07)}
.rbg{position:absolute;top:14px;left:14px;background:var(--gold);color:var(--dark);font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;padding:5px 13px;border-radius:2px;font-weight:700}
.rb{padding:26px 24px}
.rn{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--dark);margin-bottom:9px}
.rm2{display:flex;gap:14px;font-size:.74rem;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
.rd{font-size:.85rem;color:var(--muted);line-height:1.85;margin-bottom:20px}
.rf{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid #ede8e0}
.rpl{font-size:.68rem;color:#bbb;margin-bottom:3px}
.rpv{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold)}
.rpv span{font-size:.7rem;color:#bbb}
.bsm{background:var(--dark);color:#fff;padding:9px 18px;border-radius:2px;font-size:.76rem;letter-spacing:.1em;transition:background var(--t)}
.bsm:hover{background:var(--gold);color:var(--dark)}

/* CALENDAR */
#cs{padding:112px 48px;background:#fff}
.cl{display:grid;grid-template-columns:1fr 430px;gap:68px;align-items:start}
.cw{background:#fff;border:1px solid #e5ddd4;border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
.ch{background:linear-gradient(135deg,var(--dark) 0%,var(--navy) 100%);padding:20px 26px;display:flex;align-items:center;justify-content:space-between}
.cnb{width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:50%;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t)}
.cnb:hover{background:var(--gold);border-color:var(--gold);color:var(--dark)}
.cmy{font-family:'Playfair Display',serif;font-size:1.25rem;color:#fff;letter-spacing:.05em}
.cbdy{padding:20px 18px 24px}
.cdh{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px}
.cdh span{text-align:center;font-size:.68rem;letter-spacing:.08em;color:var(--muted);padding:5px 0}
.cdh span:first-child{color:#d06060}
.cdh span:last-child{color:#6080cc}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;position:relative;transition:background var(--t),color var(--t);font-size:.84rem}
.cd:hover:not(.e):not(.p):not(.bk){background:var(--gold-p);color:#5c3d1e}
.cd.e{cursor:default}
.cd.p{color:#d4ccc4;cursor:default}
.cd.td{font-weight:700;color:var(--gold)}
.cd.td::before{content:'';position:absolute;bottom:4px;width:4px;height:4px;background:var(--gold);border-radius:50%}
.cd.ci{background:var(--gold);color:var(--dark);font-weight:700;border-radius:5px 0 0 5px}
.cd.co{background:var(--gold);color:var(--dark);font-weight:700;border-radius:0 5px 5px 0}
.cd.ir{background:var(--gold-p);color:#5c3d1e;border-radius:0}
.cd.bk{background:#f2ece6;color:#ccc;cursor:not-allowed;text-decoration:line-through}
.cd.su{color:#d06060}.cd.sa{color:#6080cc}
.cd.ci.su,.cd.co.su,.cd.ci.sa,.cd.co.sa{color:var(--dark)}
.cleg{display:flex;gap:16px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid #ede8e0;background:var(--wg)}
.li{display:flex;align-items:center;gap:6px;font-size:.71rem;color:var(--muted)}
.ld2{width:13px;height:13px;border-radius:3px}
.ld2.s{background:var(--gold)}.ld2.rg{background:var(--gold-p);border:1px solid var(--gold-l)}
.ld2.bk{background:#f2ece6;border:1px solid #ddd}.ld2.td{background:#fff;border:2px solid var(--gold)}

/* BOOKING PANEL */
.bp{background:linear-gradient(160deg,var(--dark) 0%,var(--navy) 100%);border-radius:14px;overflow:hidden;box-shadow:var(--sh2)}
.bpt{padding:28px 30px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04)}
.bp-logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);letter-spacing:.1em;margin-bottom:4
